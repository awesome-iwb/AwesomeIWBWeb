server {
  listen 80;
  server_name your-domain.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name your-domain.com;

  # SSL_PROVIDER=letsencrypt:
  # ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
  #
  # SSL_PROVIDER=cloudflare-origin:
  # ssl_certificate /etc/ssl/cloudflare/awesomeiwb-origin.crt;
  # ssl_certificate_key /etc/ssl/cloudflare/awesomeiwb-origin.key;
  #
  # install.sh 在 --with-https 模式下根据 SSL_PROVIDER 选择并渲染以下路径：
  ssl_certificate __SSL_CERT_PATH__;
  ssl_certificate_key __SSL_KEY_PATH__;
  include /etc/nginx/snippets/awesomeiwb-realip.conf;

  root /var/www/awesomeiwb/dist;
  index index.html;

  location ^~ /api/uploads/ {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Cookie $http_cookie;
    proxy_pass_header Set-Cookie;
    client_max_body_size 10m;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location /api/ {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Cookie $http_cookie;
    proxy_pass_header Set-Cookie;
    client_max_body_size 10m;
    add_header Cache-Control "no-store" always;
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri =404;
  }

  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ^~ /assets/ {
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location ~* \.(woff2?|svg|png|jpg|jpeg|webp|ico)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800" always;
  }
}
