    reviews:
      - author: 2,2,3-三甲基戊烷
        content: 俗话说的好：“要稳定inkeys，要好用icp。”而其中的icp便是原版ic的延续，继承了原版ic简洁易用的特点。
      - author: Makitoid
        content: 作为批注软件还是很不错的，但是作为白板软件还是差一点。希望持续的优化！
