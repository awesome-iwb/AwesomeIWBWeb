    github_url: https://github.com/WXRIW/Ink-Canvas/
    developer_avatar: https://images.weserv.nl/?url=github.com/WXRIW.png
    description: >
      Ink Canvas 画板是一款轻量级画板软件，基于 WPF/C#，其针对希沃一体机进行了特别优化，与预装的“希沃白板 5”软件相比，启动速度大幅度提升（提升 5-10 倍），系统资源占用更小，使用体验更佳。
    notes:
      - 该项目已经停更。
