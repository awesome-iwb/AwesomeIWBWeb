description: 替代系统自带臃肿白板，提供更轻量的屏幕画笔和批注功能。
projects:
  - name: Ink Canvas
    developer: WXRIW
    status: 停更
    status_badge: https://img.shields.io/badge/%E5%81%9C%E6%9B%B4-%23b91c1c?style=flat&label=
